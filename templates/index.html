<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0,
    maximum-scale=1.0, user-scalable=no">
    <title>Kia - Your Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            height: -webkit-fill-available;
            overflow: hidden;
            font-family: 'Inter', Arial, sans-serif;
            background: #f0f2f5;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
            height: -webkit-fill-available;
            max-width: 520px;
            margin: 0 auto;
            background: #ffffff;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }

        /* ── HEADER ── */
        .chat-header {
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #f97316, #ec4899);
            flex-shrink: 0;
        }

        .header-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(255,255,255,0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            animation: pulse 2.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.3); }
            50% { box-shadow: 0 0 0 8px rgba(255,255,255,0); }
        }

        .header-info h1 {
            font-size: 17px;
            font-weight: 600;
            color: #ffffff;
        }

        .header-info p {
            font-size: 12px;
            color: rgba(255,255,255,0.85);
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 2px;
        }

        .online-dot {
            width: 7px;
            height: 7px;
            background: #ffffff;
            border-radius: 50%;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ── MESSAGES ── */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #f8f9fb;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .chat-messages::-webkit-scrollbar { display: none; }

        .message-row {
            display: flex;
            gap: 8px;
            align-items: flex-end;
            animation: fadeUp 0.3s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-row.user { flex-direction: row-reverse; }

        .msg-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f97316, #ec4899);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            margin-bottom: 2px;
            box-shadow: 0 2px 8px rgba(249,115,22,0.3);
        }

        .msg-content {
            display: flex;
            flex-direction: column;
            gap: 3px;
            max-width: 78%;
        }

        .message-row.user .msg-content { align-items: flex-end; }

        .message {
            padding: 11px 15px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.6;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message.kia {
            background: #ffffff;
            color: #1a1a2e;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            border: 1px solid #f0f0f0;
        }

        .message.user {
            background: linear-gradient(135deg, #f97316, #ec4899);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 2px 8px rgba(249,115,22,0.25);
        }

        .msg-time {
            font-size: 10px;
            color: #aaaaaa;
            padding: 0 4px;
        }

        /* ── TYPING ── */
        .typing-row {
            display: flex;
            gap: 8px;
            align-items: flex-end;
            animation: fadeUp 0.3s ease;
        }

        .typing {
            display: flex;
            gap: 5px;
            padding: 13px 16px;
            background: #ffffff;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            border: 1px solid #f0f0f0;
        }

        .typing span {
            width: 7px;
            height: 7px;
            background: #f97316;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        /* ── CLEAR BUTTON ── */
        .clear-btn-container {
            text-align: center;
            padding: 7px;
            flex-shrink: 0;
            background: #ffffff;
            border-top: 1px solid #f5f5f5;
        }

        .clear-btn {
            background: none;
            border: 1px solid #f97316;
            color: #f97316;
            padding: 4px 18px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .clear-btn:hover {
            background: #fff5f0;
        }

        /* ── INPUT ── */
        .chat-input {
            padding: 12px 16px;
            border-top: 1px solid #f0f0f0;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
            background: #ffffff;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
        }

        .chat-input input {
            flex: 1;
            padding: 11px 18px;
            border: 1.5px solid #e8e8e8;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            min-width: 0;
            background: #f8f9fb;
            color: #1a1a2e;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .chat-input input::placeholder { color: #aaaaaa; }

        .chat-input input:focus {
            border-color: #f97316;
            background: #ffffff;
        }

        .send-btn {
            width: 44px;
            height: 44px;
            min-width: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f97316, #ec4899);
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(249,115,22,0.3);
            transition: all 0.2s;
        }

        .send-btn:hover { transform: scale(1.05); }

        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        /* ── DATE DIVIDER ── */
        .date-divider {
            text-align: center;
            font-size: 11px;
            color: #bbbbbb;
            margin: 4px 0;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="chat-container">

        <!-- Header -->
        <div class="chat-header">
            <div class="header-avatar">✨</div>
            <div class="header-info">
                <h1>Kia</h1>
                <p>
                    <span class="online-dot"></span>
                    Online — Ready to help
                </p>
            </div>
        </div>

        <!-- Messages -->
        <div class="chat-messages" id="messages">
            <div class="date-divider">Today</div>
            <div class="message-row">
                <div class="msg-avatar">✨</div>
                <div class="msg-content">
                    <div class="message kia">
                        Hi! I'm Kia 👋 I can answer questions, search the web for latest news, and remember our conversation. What would you like to know?
                    </div>
                    <div class="msg-time" id="startTime"></div>
                </div>
            </div>
        </div>

        <!-- Clear Memory -->
        <div class="clear-btn-container">
            <button class="clear-btn" onclick="clearMemory()">
                🗑️ Clear Memory
            </button>
        </div>

        <!-- Input -->
        <div class="chat-input">
            <input
                type="text"
                id="userInput"
                placeholder="Message Kia..."
            />
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
        </div>

    </div>

    <script>
        const messages = document.getElementById("messages");
        const userInput = document.getElementById("userInput");
        const sendBtn = document.getElementById("sendBtn");
        const chatInput = document.querySelector(".chat-input");

        document.getElementById("startTime").textContent = getTime();

        // Fix iPhone keyboard
        window.visualViewport.addEventListener("resize", () => {
            const keyboardHeight = window.innerHeight -
            window.visualViewport.height;
            chatInput.style.paddingBottom = keyboardHeight > 0
                ? keyboardHeight + 12 + "px"
                : "max(12px, env(safe-area-inset-bottom))";
            messages.scrollTop = messages.scrollHeight;
        });

        userInput.addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendMessage();
        });

        function getTime() {
            return new Date().toLocaleTimeString([], {
                hour: "2-digit", minute: "2-digit"
            });
        }

        function addMessage(text, sender) {
            const row = document.createElement("div");
            row.classList.add("message-row", sender);
            const time = getTime();

            if (sender === "kia") {
                row.innerHTML = `
                    <div class="msg-avatar">✨</div>
                    <div class="msg-content">
                        <div class="message kia"></div>
                        <div class="msg-time">${time}</div>
                    </div>`;
            } else {
                row.innerHTML = `
                    <div class="msg-content">
                        <div class="message user">${text}</div>
                        <div class="msg-time">${time}</div>
                    </div>`;
            }

            messages.appendChild(row);
            messages.scrollTop = messages.scrollHeight;
            return row.querySelector(".message");
        }

        function showTyping() {
            const row = document.createElement("div");
            row.classList.add("typing-row");
            row.id = "typing";
            row.innerHTML = `
                <div class="msg-avatar">✨</div>
                <div class="typing">
                    <span></span><span></span><span></span>
                </div>`;
            messages.appendChild(row);
            messages.scrollTop = messages.scrollHeight;
        }

        function hideTyping() {
            const t = document.getElementById("typing");
            if (t) t.remove();
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            sendBtn.disabled = true;
            userInput.disabled = true;

            addMessage(text, "user");
            userInput.value = "";
            showTyping();

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: text })
                });

                hideTyping();
                const kiaMsg = addMessage("", "kia");

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split("\n");

                    for (const line of lines) {
                        if (line.startsWith("data: ")) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.token) {
                                    kiaMsg.textContent += data.token;
                                    messages.scrollTop = messages.scrollHeight;
                                }
                            } catch(e) {}
                        }
                    }
                }
            } catch(e) {
                hideTyping();
                addMessage("Oops! Something went wrong. Try again!", "kia");
            }

            sendBtn.disabled = false;
            userInput.disabled = false;
            userInput.focus();
        }

        async function clearMemory() {
            await fetch("/clear", { method: "POST" });
            messages.innerHTML = "";
            const divider = document.createElement("div");
            divider.className = "date-divider";
            divider.textContent = "Today";
            messages.appendChild(divider);
            addMessage("Memory cleared! Starting fresh 🧹", "kia");
        }
    </script>
</body>
</html>
