<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, 
    maximum-scale=1.0, user-scalable=no">
    <title>Kia - Your Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            height: -webkit-fill-available;
            overflow: hidden;
            background: #f0f2f5;
            font-family: Arial, sans-serif;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
            height: -webkit-fill-available;
            max-width: 480px;
            margin: 0 auto;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .chat-header {
            background: linear-gradient(135deg, #f97316, #ec4899);
            padding: 16px 20px;
            text-align: center;
            color: white;
            flex-shrink: 0;
        }

        .chat-header h1 {
            font-size: 22px;
        }

        .chat-header p {
            font-size: 11px;
            opacity: 0.8;
            margin-top: 2px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.kia {
            background: #f0f2f5;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.user {
            background: linear-gradient(135deg, #f97316, #ec4899);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .typing {
            display: flex;
            gap: 4px;
            padding: 10px 14px;
            background: #f0f2f5;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
            width: fit-content;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: #f97316;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        .clear-btn-container {
            text-align: center;
            padding: 6px;
            flex-shrink: 0;
            background: white;
            border-top: 1px solid #f5f5f5;
        }

        .clear-btn {
            background: none;
            border: 1px solid #f97316;
            color: #f97316;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }

        .chat-input {
            padding: 12px 16px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
            background: white;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
        }

        .chat-input input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            min-width: 0;
        }

        .chat-input input:focus {
            border-color: #f97316;
        }

        .chat-input button {
            width: 42px;
            height: 42px;
            min-width: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f97316, #ec4899);
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="chat-container">

        <!-- Header -->
        <div class="chat-header">
            <h1>✨ Kia</h1>
            <p>Your Personal Assistant</p>
        </div>

        <!-- Messages -->
        <div class="chat-messages" id="messages">
            <div class="message kia">
                Hi! I am Kia 👋 Ask me anything!
            </div>
        </div>

        <!-- Clear Memory Button -->
        <div class="clear-btn-container">
            <button class="clear-btn" onclick="clearMemory()">
                🗑️ Clear Memory
            </button>
        </div>

        <!-- Input Box -->
        <div class="chat-input">
            <input
                type="text"
                id="userInput"
                placeholder="Ask Kia anything..."
            />
            <button onclick="sendMessage()">➤</button>
        </div>

    </div>

    <script>
        const messages = document.getElementById("messages");
        const userInput = document.getElementById("userInput");
        const chatInput = document.querySelector(".chat-input");

        // Fix iPhone keyboard pushing layout
        window.visualViewport.addEventListener("resize", () => {
            const keyboardHeight = window.innerHeight - 
            window.visualViewport.height;
            chatInput.style.paddingBottom = keyboardHeight > 0
                ? keyboardHeight + 12 + "px"
                : "max(12px, env(safe-area-inset-bottom))";
            messages.scrollTop = messages.scrollHeight;
        });

        // Send on Enter key
        userInput.addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendMessage();
        });

        // Add message to screen
        function addMessage(text, sender) {
            const div = document.createElement("div");
            div.classList.add("message", sender);
            div.textContent = text;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        // Show typing dots
        function showTyping() {
            const div = document.createElement("div");
            div.classList.add("typing");
            div.id = "typing";
            div.innerHTML = "<span></span><span></span><span></span>";
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        // Hide typing dots
        function hideTyping() {
            const typing = document.getElementById("typing");
            if (typing) typing.remove();
        }

        // Send message to Kia
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, "user");
            userInput.value = "";
            showTyping();

            const response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text })
            });

            const data = await response.json();
            hideTyping();
            addMessage(data.reply, "kia");
        }

        // Clear Kia's memory
        async function clearMemory() {
            await fetch("/clear", { method: "POST" });
            messages.innerHTML = "";
            addMessage("Memory cleared! Starting fresh 🧹", "kia");
        }
    </script>
</body>
</html>
